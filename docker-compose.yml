services:
  scout_bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    image: webrtc-ros-bridge-v2-scout_bridge
    container_name: scout_bridge
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
    network_mode: host

  scout_perception:
    build:
      context: .
      dockerfile: docker/Dockerfile.perception
    image: webrtc-ros-bridge-v2-scout_perception
    container_name: scout_perception
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
    network_mode: host

  scout_shell:
    build:
      context: .
      dockerfile: docker/Dockerfile.shell
    image: webrtc-ros-bridge-v2-scout_shell
    container_name: scout_shell
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
    network_mode: host
    profiles:
      - shell
