services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        CACHEBUST: ${CACHEBUST:-0}
    image: webrtc-ros-bridge-v2-app
    container_name: scout_app
    ports:
      - "8000:8000"
    volumes:
      - .:/root/workspace
    working_dir: /root/workspace
    environment:
      - PYTHONPATH=/root/workspace
      - STUN_URL=${STUN_URL:-stun:stun.l.google.com:19302}
      - TURN_URL=${TURN_URL:-turn:localhost:3478}
      - TURN_USERNAME=${TURN_USERNAME:-scout}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-scout}
    profiles:
      - webrtc

  scout_turn:
    image: coturn/coturn:latest
    container_name: scout_turn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    volumes:
      - ./docker/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]
    profiles:
      - webrtc

  frodobot_sdk:
    build:
      context: .
      dockerfile: docker/Dockerfile.frodobot
    image: webrtc-ros-bridge-v2-scout_sdk
    container_name: scout_sdk
    env_file:
      - path: .env.frodobots
        required: false
    ports:
      - "8001:8000"
    environment:
      # App listens on 8000 inside container so headless browser can load http://127.0.0.1:8000/sdk; host exposes 8001.
      - SDK_PAGE_URL=http://127.0.0.1:8000/sdk
      # Skip headless browser join when Earth Rovers auth is not configured. Set to 0 in .env to enable real front camera.
      - SDK_SKIP_BROWSER_JOIN=${SDK_SKIP_BROWSER_JOIN:-1}
    command: ["python3", "-m", "hypercorn", "main:app", "--bind", "0.0.0.0:8000"]    

  scout_bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    image: webrtc-ros-bridge-v2-scout_bridge
    container_name: scout_bridge
    ports:
      - "8765:8765"
    depends_on:
      - scout_sdk
      - app
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
      # Use Docker service names so bridge can reach SDK/app/TURN on all platforms (Mac host networking doesn't share 127.0.0.1)
      - SDK_LOCAL_URL=${SDK_LOCAL_URL:-http://scout_sdk:8000}
      - SIGNALING_WS_URL=${SIGNALING_WS_URL:-ws://app:8000/ws/signaling}
      - APP_URL=${APP_URL:-http://app:8000}
      - STUN_URL=${STUN_URL:-stun:stun.l.google.com:19302}
      - TURN_URL=${TURN_URL_NODE:-turn:scout_turn:3478}
      - TURN_USERNAME=${TURN_USERNAME:-scout}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-scout}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
    # No network_mode: host so bridge can reach scout_sdk via Docker DNS (required on Docker Desktop for Mac)
    # bridge_node, controller_node, floor_mask_node, optical_flow_node, world_model_node, wander_node, foxglove_bridge in background; webrtc_node in foreground
    command: ["bash", "-c", "cd /root/workspace/ros2_ws && source /opt/ros/kilted/setup.bash && [ -f /root/workspace/.env ] && set -a && source /root/workspace/.env && set +a && source install/setup.bash && (ros2 run connectx_robot_bridge bridge_node &) && (ros2 run connectx_robot_bridge calibration_node &) && (ros2 run connectx_controller controller_node &) && (ros2 run connectx_perception_cpp floor_mask_node 2>&1 | sed 's/^/[floor_mask_node] /' &) && (ros2 run connectx_perception_cpp optical_flow_node 2>&1 | sed 's/^/[optical_flow_node] /' &) && (python3 /root/workspace/scripts/optical_flow_relay_to_app.py &) && (python3 /root/workspace/scripts/floor_mask_relay_to_app.py &) && (ros2 run connectx_planner world_model_node 2>&1 | sed 's/^/[world_model_node] /' &) && (ros2 run connectx_planner wander_node &) && (ros2 run foxglove_bridge foxglove_bridge &) && sleep 1 && exec ros2 run connectx_teleop webrtc_node"]
    profiles:
      - webrtc

  scout_perception:
    build:
      context: .
      dockerfile: docker/Dockerfile.perception
    image: webrtc-ros-bridge-v2-scout_perception
    container_name: scout_perception
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
      # Relay posts depth to app; on Docker Desktop Mac (host network = VM) use host.docker.internal to reach app on Mac
      - APP_URL=${APP_URL:-http://host.docker.internal:8000}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
      - pip_cache:/root/.cache/pip
    network_mode: host
    command: ["bash", "-c", "cd /root/workspace && ./scripts/run_perception_with_relay.sh"]
    profiles:
      - webrtc

  scout_webrtc:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    image: webrtc-ros-bridge-v2-scout_bridge
    container_name: scout_webrtc
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
      # Host network: reach app at host's published port 8000 (host.docker.internal works on Mac and Linux Docker 20.10+)
      - SIGNALING_WS_URL=${SIGNALING_WS_URL:-ws://host.docker.internal:8000/ws/signaling}
      # TURN: webrtc node (in Docker VM) reaches TURN at host; browser uses TURN_URL from .env (e.g. turn:localhost:3478)
      - STUN_URL=${STUN_URL:-stun:stun.l.google.com:19302}
      - TURN_URL=${TURN_URL_NODE:-turn:host.docker.internal:3478}
      - TURN_USERNAME=${TURN_USERNAME:-scout}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-scout}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
    network_mode: host
    command: ["bash", "-c", "cd /root/workspace/ros2_ws && source /opt/ros/kilted/setup.bash && [ -f /root/workspace/.env ] && set -a && source /root/workspace/.env && set +a && export TURN_URL=turn:host.docker.internal:3478 && source install/setup.bash && exec ros2 run connectx_teleop webrtc_node"]
    profiles:
      - webrtc

  scout_shell:
    build:
      context: .
      dockerfile: docker/Dockerfile.shell
    image: webrtc-ros-bridge-v2-scout_shell
    container_name: scout_shell
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/workspace
    network_mode: host
    profiles:
      - shell

  connectx_mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    image: connectx-mcp
    container_name: connectx_mcp
    ports:
      - "8002:8002"
    environment:
      - APP_URL=${APP_URL:-http://app:8000}
      - MCP_PORT=8002
    depends_on:
      - app
    profiles:
      - webrtc

  connectx_langgraph:
    build:
      context: .
      dockerfile: docker/Dockerfile.langgraph
    image: connectx-langgraph
    container_name: connectx_langgraph
    ports:
      - "8123:8123"
    environment:
      - APP_URL=${APP_URL:-http://app:8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-true}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-robot}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      - app
    profiles:
      - webrtc

volumes:
  pip_cache:
    driver: local
