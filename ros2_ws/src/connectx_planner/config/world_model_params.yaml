# ConnectX world model node parameters.
# Interprets optical flow + velocity into navigation state.
# Lower risk_forward_threshold = treat obstacles as unsafe sooner (helps on carpet where flow mags can be lower).
# When telemetry speed is 0, fallback_velocity_for_risk is used so obstacle mode still triggers.
world_model_node:
  ros__parameters:
    risk_forward_threshold: 8.0
    min_linear_velocity_for_risk: 0.01
    fallback_velocity_for_risk: 0.2
    max_angular_velocity_for_risk: 0.5
    velocity_epsilon: 0.05
    straight_dead_zone: 0.3
    publish_hz: 25.0
    optical_flow_topic: "/optical_flow"
    robot_telemetry_topic: "/robot/telemetry"
    navigation_state_topic: "/navigation_state"
