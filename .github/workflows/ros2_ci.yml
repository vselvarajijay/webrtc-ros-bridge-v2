# CI for ROS2 workspace: build and test on push/PR when ros2_ws changes.
# Uses ROS 2 Humble (LTS) so no custom distro (e.g. kilted) is required.
name: ROS2 CI

on:
  push:
    paths:
      - 'ros2_ws/**'
  pull_request:
    paths:
      - 'ros2_ws/**'

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build and test deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-pytest \
            ros-humble-ament-mypy
          rm -rf /var/lib/apt/lists/*
        shell: bash

      - name: Cache colcon
        uses: actions/cache@v4
        with:
          path: |
            ros2_ws/build
            ros2_ws/install
            ros2_ws/log
          key: ros2-${{ runner.os }}-humble-${{ hashFiles('ros2_ws/src/**') }}
          restore-keys: |
            ros2-${{ runner.os }}-humble-

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          source install/setup.bash
          # Exclude linter tests (flake8, pep257, mypy, xmllint, copyright) so only unit test failures fail CI
          export PYTEST_ADDOPTS='-m "not linter"'
          colcon test --event-handlers console_direct+ --python-testing pytest
        shell: bash

      - name: Test results
        if: always()
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          source install/setup.bash
          colcon test-result --verbose --all
        shell: bash
